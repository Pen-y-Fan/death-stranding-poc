name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install wasm-opt (binaryen)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build (wasm-pack)
        run: |
          # wasm-pack build --target web --release
          # Manual build to control flags if needed, or stick to wasm-pack but maybe add environment variables
          # Some versions of wasm-bindgen enable externref by default which can cause issues in some browsers or environments
          # if not properly handled by the loader.
          wasm-pack build --target web --release -- --features wasm-bindgen/std

      - name: Minify index.html
        run: |
          npx html-minifier-terser --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --remove-tag-whitespace --use-short-doctype index.html -o index.min.html
          mv index.min.html index.html

      - name: Prepare GitHub Pages deployment
        run: |
          mkdir -p docs
          cp -R pkg docs/
          cp -R data docs/
          cp index.html docs/
          cp styles.css docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

