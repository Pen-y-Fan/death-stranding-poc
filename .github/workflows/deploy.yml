name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install wasm-opt (binaryen)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build (wasm-pack)
        run: |
          # Disable reference-types (externref) to avoid RangeError: WebAssembly.Table.grow failed
          # and ensure compatibility across environments.
          RUSTFLAGS="-C target-feature=-reference-types" wasm-pack build --target web --release
          # Patch the JS glue to remove __wbindgen_init_externref_table if it exists
          # and prevent RangeError: WebAssembly.Table.grow(): failed to grow table by 4
          # We use a perl regex to handle the multi-line/greedy match of the function body
          perl -0777 -pi -e 's/imports\.wbg\.__wbindgen_init_externref_table = function\(\) \{.*?\};/imports.wbg.__wbindgen_init_externref_table = function() {};/gs' pkg/death_stranding_poc.js
          # Note: The above patch is a targeted fix for the reported issue in environments 
          # where wasm-bindgen defaults to enabling reference-types.

      - name: Minify index.html
        run: |
          npx html-minifier-terser --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --remove-tag-whitespace --use-short-doctype index.html -o index.min.html
          mv index.min.html index.html

      - name: Prepare GitHub Pages deployment
        run: |
          mkdir -p docs
          cp -R pkg docs/
          cp -R data docs/
          cp index.html docs/
          cp styles.css docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

